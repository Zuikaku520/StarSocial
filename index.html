<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>星穹社交系统 · 开拓者朋友圈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- 顶部导航栏 -->
        <header class="stellar-nav">
            <div class="nav-left">
                <div class="logo">
                    <img src="images/icons/header.png" alt="星穹logo" class="sys-logo">
                    <span class="title">StaRail-Social</span>
                </div>
            </div>
            <div class="nav-right">
                <div class="user-badge">
                    <img class="avatar" src="images/avatars/trailblazer-avatar.png" alt="开拓者">
                    <span class="name">开拓者</span>
                </div>
            </div>
        </header>

        <!-- 朋友圈动态列表容器 -->
        <main class="posts-container" id="posts-container">
            <!-- 这里会由JavaScript动态生成卡片 -->
            <div class="loading">正在加载星穹动态...</div>
        </main>
        <!-- 新增：聊天视图（初始隐藏） -->
        <div class="chat-view" id="chat-view" style="display: none;">
            <!-- 聊天列表页 -->
            <div class="chat-list-container" id="chat-list">
                <!-- 所有聊天会话列表 -->
            </div>
        
            <!-- 单聊详情页（初始隐藏） -->
            <div class="chat-detail-container" id="chat-detail" style="display: none;">
                <div class="chat-header">
                    <button class="back-btn" id="back-to-list">←</button>
                    <button class="theme-toggle-btn" id="theme-toggle">🌙</button>
                    <img class="chat-avatar" id="chat-avatar" src="" alt="">
                    <span class="chat-name" id="chat-name"></span>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <!-- 消息列表 -->
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="给朋友留言..." class="chat-input">
                    <button id="send-btn" class="send-btn">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
