<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>星穹社交系统 · 开拓者朋友圈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- 顶部导航栏 -->
        <header class="stellar-nav">
            <div class="nav-left">
                <div class="logo">
                    <img src="images/icons/header.png" alt="星穹logo" class="sys-logo">
                    <span class="title">StaRail-Social</span>
                </div>
            </div>
            <div class="nav-right">
                <div class="user-badge">
                    <img class="avatar" src="images/avatars/trailblazer-avatar.png" alt="开拓者">
                    <span class="name">开拓者</span>
                </div>
            </div>
        </header>

        <div class="publish-area"
            style="background: rgba(20,28,40,0.7); backdrop-filter: blur(12px); border-radius: 28px; padding: 16px; margin-bottom: 20px;">
            <textarea id="postContent" placeholder="写点什么吧..." rows="2"
                style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(0,212,255,0.3); border-radius: 16px; padding: 12px; color: white; resize: vertical;"></textarea>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
                <label for="postImage" style="cursor: pointer;">📷 添加图片</label>
                <input type="file" id="postImage" accept="image/*" style="display: none;">
                <button id="publishBtn"
                    style="background: #00D4FF; border: none; padding: 8px 24px; border-radius: 40px; font-weight: bold; cursor: pointer;">发布</button>
            </div>
        </div>

        <!-- 朋友圈动态列表容器 -->
        <main class="posts-container" id="posts-container">
            <!-- 这里会由JavaScript动态生成卡片 -->
            <div class="loading">正在加载星穹动态...</div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
